name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: npm install --global @verboo/code@0.10.7
      - run: bun run check
      - run: git diff --exit-code -- dist
      - run: verboo plugin validate .
      - run: verboo plugin validate .claude-plugin/plugin.json
      - run: bun scripts/check-release-tag.ts
      - run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
