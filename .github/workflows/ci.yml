name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            verboo: 0.10.7
          - os: windows-latest
            verboo: 0.10.7
          - os: ubuntu-latest
            verboo: latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: npm install --global "@verboo/code@${{ matrix.verboo }}"
      - run: bun run validate:versions
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
      - run: bun run build
      - run: git diff --exit-code -- dist
      - run: verboo plugin validate .
      - run: verboo plugin validate .claude-plugin/plugin.json
